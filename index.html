<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まいにちの つみかさね</title>
<meta name="theme-color" content="#1e1b4b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="つみかさね">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23312e81'/%3E%3Ctext x='50' y='68' font-size='56' text-anchor='middle'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
<style>
:root{
  --orange:#fb923c; --rose:#f43f5e; --lime:#a3e635; --emerald:#10b981;
  --indigo:#312e81; --purple:#7c3aed; --amber:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
  background:linear-gradient(160deg,#1e1b4b 0%,#312e81 55%,#3b0764 100%);
  min-height:100vh;color:#1e293b;padding-bottom:90px;
}
.wrap{max-width:760px;margin:0 auto;padding:0 14px}

/* header */
.header{padding:20px 0 14px;color:#fff}
.h-top{display:flex;justify-content:space-between;align-items:center}
.h-eyebrow{font-size:10px;letter-spacing:3px;color:#fdba74;font-weight:700}
.h-date{font-size:22px;font-weight:900}
.h-streak{text-align:right}
.wx-box{background:rgba(255,255,255,.1);border-radius:14px;padding:10px 6px 8px;margin-top:10px}
.wx-top{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 8px 8px}
.wx-info{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 10px;flex:1;min-width:0;cursor:pointer}
.wx-loc{font-size:12px;font-weight:700;color:#fff;opacity:.95;white-space:nowrap;text-decoration:none;cursor:pointer}
.wx-loc:active{opacity:.7}
.wx-range{cursor:pointer}
.wx-range{font-size:12px;font-weight:900;white-space:nowrap}
.wx-hi{color:#fca5a5;margin-right:8px}
.wx-lo{color:#93c5fd}
.wx-plantoggle{flex:0 0 auto;border:none;background:rgba(255,255,255,.25);color:#fff;font-family:inherit;font-weight:900;font-size:11px;border-radius:99px;padding:7px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap}
.wx-plantoggle:active{background:rgba(255,255,255,.4)}
.wx-scroll{overflow-x:auto;padding:0 6px 4px;scrollbar-width:thin}
.wx-scroll::-webkit-scrollbar{height:4px}
.wx-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px}
.wx-grid{display:grid;grid-template-columns:repeat(18,minmax(30px,1fr));gap:2px;min-width:560px}
.wx-hour{position:relative;text-align:center;color:#fff;background:rgba(255,255,255,.06);border-radius:10px;padding:6px 2px}
.wx-hour.now{background:linear-gradient(160deg,rgba(251,146,60,.55),rgba(244,63,94,.45));box-shadow:0 0 0 2px #fbbf24 inset;color:#fff}
.wx-nowtag{position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:#f59e0b;color:#fff;font-size:8px;font-weight:900;border-radius:99px;padding:1px 7px;white-space:nowrap}
.wx-h{font-size:10px;opacity:.8;font-weight:700}
.wx-ic{font-size:20px;line-height:1;display:flex;justify-content:center;align-items:center;height:28px}
.wx-svg{display:block}
.wx-t{font-size:13px;font-weight:900}
.wx-pop{font-size:9px;color:#bae6fd;font-weight:700}
.wx-pop.dim{opacity:.4;color:#fff}
.wx-planrow{display:grid;grid-template-columns:repeat(18,minmax(30px,1fr));gap:2px;min-width:560px;margin-top:4px}
.wx-plan{border-radius:7px;color:#fff;font-size:10px;font-weight:900;padding:4px 6px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.wx-plan span{overflow:hidden;text-overflow:ellipsis}
.h-streak .n{font-size:30px;font-weight:900;color:#fdba74;line-height:1}
.h-streak .l{font-size:10px;color:#a5b4fc}
.progress{margin-top:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:99px;height:22px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#fb923c,#fcd34d,#a3e635);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .4s;min-width:34px}
.progress-fill span{font-size:10px;font-weight:900;color:#1e1b4b}
.h-sub{text-align:center;font-size:11px;color:#c7d2fe;margin-top:5px}
.prog-block{margin:14px 0 4px}

/* sections */
.sec-head{border-radius:16px 16px 0 0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:900;margin-top:18px}
.sec-head.morning{background:linear-gradient(90deg,#fb923c,#f43f5e)}
.sec-head.evening{background:linear-gradient(90deg,#6366f1,#a855f7)}
.sec-body{background:rgba(255,255,255,.96);border-radius:0 0 16px 16px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.task{padding:12px 12px;border-bottom:1px solid #f1f5f9}
.task:last-child{border-bottom:none}
.t-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.t-check{width:50px;height:50px;border-radius:16px;border:4px solid #e2e8f0;background:#f1f5f9;font-size:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.t-check.on{background:linear-gradient(135deg,#a3e635,#10b981);border-color:#6ee7b7;color:#fff;transform:scale(1.05)}
.t-main{flex:1;min-width:0}
.t-title{font-weight:900;font-size:15px;line-height:1.3}
.t-title.done{color:#059669}
.t-desc{font-size:11px;color:#64748b;margin-top:2px;line-height:1.4}
.t-min{font-size:13px;font-weight:900;color:#94a3b8;flex-shrink:0}
.t-extra{margin-top:9px;padding-left:62px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.feel{font-size:11px;font-weight:700;border-radius:99px;padding:6px 11px;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer}
.feel.on{background:#fef3c7;border-color:#fbbf24;color:#b45309;transform:scale(1.05)}
.rec-label{font-size:11px;font-weight:700;color:#475569;display:flex;align-items:center;gap:5px}
.rec-input{width:64px;border:2px solid #fcd34d;border-radius:10px;padding:5px;text-align:center;font-weight:900;color:#b45309;font-size:14px}

/* free input cards */
.input-card{background:rgba(255,255,255,.96);border-radius:16px;padding:14px 16px;margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.input-card .lbl{font-size:11px;font-weight:900;letter-spacing:1px;margin-bottom:4px}
.lbl.o{color:#ea580c}.lbl.p{color:#7c3aed}
.input-card input{width:100%;border:none;border-bottom:2px solid #fed7aa;font-size:15px;font-weight:700;padding:6px 2px;outline:none;background:transparent;font-family:inherit}
.input-card input:focus{border-color:#fb923c}
.input-card.purple input{border-color:#ddd6fe}
.input-card.purple input:focus{border-color:#8b5cf6}

/* tabs */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(30,27,75,.97);border-top:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);z-index:40}
.tabbar-in{max-width:760px;margin:0 auto;display:flex}
.tab{flex:1;padding:10px 0 12px;text-align:center;font-size:12px;font-weight:700;color:#818cf8;cursor:pointer;border:none;background:none;font-family:inherit}
.tab .ico{font-size:22px;display:block}
.tab.on{color:#fdba74}

/* log view */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.stat{background:rgba(255,255,255,.96);border-radius:16px;padding:12px 6px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.stat .ico{font-size:20px}.stat .v{font-size:20px;font-weight:900}.stat .l{font-size:10px;color:#94a3b8;font-weight:700}
.card{background:rgba(255,255,255,.96);border-radius:16px;padding:16px;margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.card-title{font-size:13px;font-weight:900;color:#334155;margin-bottom:12px}
.heat{display:flex;gap:5px;flex-wrap:wrap}
.heat-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.heat-box{width:32px;height:32px;border-radius:9px;border:1px solid #e2e8f0}
.heat-d{font-size:8px;color:#94a3b8}
.bars{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:38px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,#fb923c,#f97316);min-height:3px}
.bar-v{font-size:10px;font-weight:900;color:#ea580c}
.bar-d{font-size:9px;color:#94a3b8}
.empty{font-size:12px;color:#94a3b8;text-align:center;padding:16px 0}
.sig-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0}
.sig-row .name{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sig-love{color:#d97706;font-weight:900}.sig-sub{color:#94a3b8;font-weight:700}
.sig-note{font-size:10px;color:#94a3b8;border-top:1px solid #f1f5f9;padding-top:8px;margin-top:8px;line-height:1.6}
.diary-row{border-left:4px solid #fdba74;padding:3px 0 3px 10px;margin-bottom:8px;font-size:13px}
.diary-d{font-size:10px;color:#94a3b8;font-weight:700}
.diary-t{font-weight:700;color:#334155}
.clog-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}
.clog-item{display:flex;gap:10px;font-size:13px;border-bottom:1px solid #f1f5f9;padding-bottom:8px}
.clog-t{font-size:10px;color:#94a3b8;font-weight:700;width:74px;flex-shrink:0;line-height:1.5}
.clog-body{flex:1;line-height:1.5}
.clog-type{font-size:11px;font-weight:900;border-radius:99px;padding:1px 8px}
.clog-type.add{background:#dcfce7;color:#15803d}
.clog-type.edit{background:#dbeafe;color:#1d4ed8}
.clog-type.del{background:#fee2e2;color:#dc2626}
.clog-detail{font-size:11px;color:#64748b;margin-top:2px}
.clog-more{margin-top:10px;text-align:center;font-size:12px;font-weight:900;color:#7c3aed;cursor:pointer;padding:6px;border-top:1px dashed #ddd6fe}
.rec-inwrap{display:inline-flex;align-items:center;gap:4px}
.rec-unit{font-size:12px;font-weight:900;color:#64748b}
.rec-block{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #f1f5f9}
.rec-block-head{font-weight:900;font-size:15px;color:#1e293b;margin-bottom:6px}
.rec-best{font-size:13px;color:#7c3aed;font-weight:700;margin-bottom:4px}
svg.line-chart{width:100%;height:160px}

/* settings */
.set-item{display:flex;align-items:center;gap:8px;background:#f8fafc;border-radius:12px;padding:9px 10px;margin-bottom:8px}
.set-item .ico{font-size:20px}
.set-item .info{flex:1;min-width:0}
.set-item .ti{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-item .su{font-size:10px;color:#94a3b8}
.sbtn{border:none;font-family:inherit;font-weight:700;font-size:11px;border-radius:9px;padding:6px 9px;cursor:pointer}
.sbtn.mv{background:none;color:#94a3b8;font-size:14px;padding:4px 5px}
.sbtn.ed{background:#dbeafe;color:#2563eb}
.sbtn.de{background:#fee2e2;color:#ef4444}
.add-btn{width:100%;padding:10px;border-radius:12px;border:2px dashed;background:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.add-btn.o{border-color:#fdba74;color:#ea580c}
.add-btn.p{border-color:#c4b5fd;color:#7c3aed}
.limit-note{font-size:10px;color:#94a3b8;text-align:center;padding:4px}
.note-list{font-size:11px;color:#64748b;line-height:1.8;padding-left:18px}
.io-row{display:flex;gap:10px}
.io-btn{flex:1;padding:11px;border-radius:12px;border:none;font-family:inherit;font-weight:900;font-size:13px;cursor:pointer}
.io-btn.ex{background:linear-gradient(90deg,#fb923c,#f43f5e);color:#fff}
.io-btn.im{background:#e0e7ff;color:#4338ca}

/* schedule */
.sch-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:14px}
.sch-toolbar .st-title{font-size:15px;font-weight:900;color:#fff}
.sch-addbtn{border:none;font-family:inherit;font-weight:900;font-size:12px;border-radius:99px;padding:8px 14px;background:linear-gradient(90deg,#0ea5e9,#6366f1);color:#fff;cursor:pointer}
.grid-wrap{background:rgba(255,255,255,.96);border-radius:14px;margin-top:12px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.25);max-height:70vh}
.now-line{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:5;pointer-events:none}
.now-dot{position:absolute;left:-1px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ef4444}
.grid{position:relative;display:grid;grid-template-columns:38px repeat(7,1fr);min-width:560px}
.gh{position:sticky;top:0;z-index:3;background:#1e1b4b;color:#fff;font-size:11px;font-weight:900;text-align:center;padding:6px 2px;border-left:1px solid rgba(255,255,255,.1)}
.gh.today{background:#6366f1}
.gh.corner{left:0;z-index:4}
.gcol{position:relative;border-left:1px solid #eef;min-height:100%}
.gtime{font-size:9px;color:#94a3b8;text-align:right;padding-right:4px;height:5px;line-height:5px;border-top:none}
.gtime.hour{color:#475569;font-weight:700;border-top:1px solid #cbd5e1;height:5px;line-height:1px}
.gtime.half{border-top:1px solid #eef0f5}
.gcell{height:5px;border-top:none;cursor:pointer}
.gcell.hour{border-top:1px solid #d8def0}
.gcell.half{border-top:1px solid #f1f3f9}
".gcell:active{background:#eef2ff}
.gnotes{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:3px;height:46px;overflow-y:auto;box-sizing:border-box}
.gnotes-spacer{height:46px;border-bottom:1px solid #e2e8f0;box-sizing:border-box}
.gnote-block{font-size:9px;line-height:1.25;padding:3px 4px;margin-bottom:2px;background:#fff7ed;color:#9a3412;font-weight:700;border-radius:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gnote-add{font-size:9px;color:#cbd5e1;text-align:center;cursor:pointer;padding:1px}
.gh-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.25);border-radius:99px;padding:1px 6px;margin-left:2px}
.gh-badge.add{background:rgba(255,255,255,.15)}
.gnote-mini{font-size:9px;line-height:1.25;padding:2px 4px;margin-bottom:2px;background:#fff7ed;color:#9a3412;font-weight:700;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dn-list{max-height:340px;overflow:auto;margin:8px 0}
.dn-item{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.dn-item-title{font-weight:900;font-size:15px;color:#9a3412}
.dn-item-prev{font-size:12px;color:#a8743c;margin-top:3px;line-height:1.5}
.note-body{font-size:13px;line-height:1.8;color:#334155;white-space:pre-wrap;word-break:break-word;background:#f8fafc;border-radius:10px;padding:12px;margin:8px 0;max-height:300px;overflow:auto}
.memo-head{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.memo-h-title{font-size:17px;font-weight:900;color:#fff}
.memo-add{border:none;font-family:inherit;font-weight:900;font-size:12px;border-radius:99px;padding:9px 16px;background:linear-gradient(90deg,#0ea5e9,#14b8a6);color:#fff;cursor:pointer}
.memo-list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.memo-card{background:rgba(255,255,255,.96);border-radius:14px;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.18);cursor:pointer}
.memo-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.memo-card-title{font-weight:900;font-size:15px;color:#1e293b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.memo-share-badge{font-size:10px;font-weight:700;color:#0d9488;background:#ccfbf1;border-radius:99px;padding:3px 9px;flex-shrink:0}
.memo-card-time{font-size:11px;color:#94a3b8;font-weight:700;margin-top:2px}
.memo-card-prev{font-size:13px;color:#64748b;margin-top:6px;line-height:1.5}
.memo-add{padding:9px 14px;font-size:12px}
.memo-add.diary{background:linear-gradient(90deg,#f59e0b,#ec4899)}
.memo-card.diary{border-left:4px solid #f59e0b}
.dtag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.dtag{font-size:10px;font-weight:700;background:#fef3c7;color:#b45309;border-radius:99px;padding:2px 9px}
.mf-bar{display:flex;gap:6px;margin-top:12px;background:rgba(255,255,255,.1);padding:4px;border-radius:12px}
.mf-pill{flex:1;border:none;font-family:inherit;font-weight:900;font-size:13px;border-radius:9px;padding:9px;cursor:pointer;background:transparent;color:rgba(255,255,255,.6)}
.mf-pill.on{background:#fff;color:#4338ca}
.mf-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mf-tag{border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-family:inherit;font-weight:700;font-size:11px;border-radius:99px;padding:5px 12px;cursor:pointer}
.mf-tag.on{background:#fbbf24;border-color:#fbbf24;color:#7c2d12}
.dv-row{margin:8px 0}
.dv-label{font-size:11px;color:#94a3b8;font-weight:700}
.dv-val{font-size:14px;color:#334155;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.dv-next{margin-top:10px;background:#fef3c7;border-radius:10px;padding:10px 12px;font-weight:700;color:#b45309;font-size:13px}
.dtag-picks,.dtag-pick{display:inline-block}
.dtag-picks{display:flex;flex-wrap:wrap;gap:6px}
.dtag-pick{border:2px solid #e2e8f0;background:#fff;font-family:inherit;font-weight:700;font-size:12px;border-radius:99px;padding:6px 12px;cursor:pointer;color:#64748b}
.dtag-pick.on{background:#fef3c7;border-color:#f59e0b;color:#b45309}
.tagmng{display:flex;flex-wrap:wrap;gap:6px}
.tagmng-item{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#b45309;font-weight:700;font-size:12px;border-radius:99px;padding:4px 6px 4px 12px}
.tagmng-item button{border:none;background:#f59e0b;color:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;font-weight:900;line-height:1}
.dplan-card{background:linear-gradient(120deg,#fef3c7,#fed7aa);border-radius:14px;padding:12px 14px;margin:14px 0 12px}
.dplan-item{display:flex;align-items:center;gap:8px}
.dplan-tap{flex:1;cursor:pointer}
.dplan-item.hidden{opacity:.55}
.dplan-eye{flex:0 0 auto;border:none;background:rgba(255,255,255,.6);border-radius:8px;font-size:16px;padding:4px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dplan-eye:active{background:rgba(255,255,255,.9)}
.dplan-allhidden{font-size:12px;color:#a8743c;font-weight:700}
.dplan-hiddenbar{margin-top:8px;font-size:12px;font-weight:900;color:#b45309;cursor:pointer;border-top:1px dashed #f59e0b;padding-top:8px}
.rsv-badge{display:inline-block;font-size:9px;font-weight:900;border-radius:99px;padding:2px 8px;margin-left:6px;vertical-align:middle}
.rsv-badge.soon{background:#dbeafe;color:#1d4ed8}
.rsv-badge.until{background:#fef3c7;color:#b45309}
.rsv-badge.ended{background:#e2e8f0;color:#64748b}
.set-item.rsv-dim{opacity:.6}
.dplan-head{font-weight:900;color:#b45309;font-size:13px;margin-bottom:6px}
.dplan-item{font-size:14px;color:#7c2d12;font-weight:700;margin:3px 0;cursor:pointer;padding:4px 0}

/* ───────────────────────────────────────────

   data: localStorage (this browser/device)

const LS_TASKS='maiken_tasks_v1', LS_DAYS='maiken_days_v1';

};
const FEELS=[
  {key:'love',emoji:'😆',label:'もっとやりたい！'},

  {key:'meh',emoji:'😮‍💨',label:'いやだった'},
];

/* ── state ── */
let tasks=load(LS_TASKS,DEFAULT_TASKS);
let days=load(LS_DAYS,{});
let tab='today';
let editing=null;
let pendingImg;          // 編集中の画像（undefined=変更なし, null=削除, 文字列=新画像）
let repDays=30;          // レポート対象期間
let logSub='report';     // きろくタブ内の表示 'report'|'log'
let cheers=load('maiken_cheers_v1',[]);   // 受信した応援

// 既存メモの後方互換：kindが無いものはメモ扱い（タイトルは本文先頭へ統合）
memos=memos.map(function(m){
  if(m.kind)return m;
  const t=(m.title&&m.title!=='(タイトルなし)')?m.title:'';
  return {id:m.id,time:m.time,kind:'memo',body:(t?(t+(m.body?'\n'+m.body:'')):(m.body||'')),shared:!!m.shared};
});
let memoView=null;

function saveDiaryTags(){try{localStorage.setItem('maiken_diarytags_v1',JSON.stringify(diaryTags))}catch(e){}queuePlanSync();}
let memoFilter=load('maiken_memofilter_v1',{kind:'all',tags:[]}); // 一覧フィルター
function saveMemoFilter(){try{localStorage.setItem('maiken_memofilter_v1',JSON.stringify(memoFilter))}catch(e){}}

function saveWeatherLoc(){try{localStorage.setItem('maiken_weatherloc_v1',JSON.stringify(weatherLoc))}catch(e){}queuePlanSync();}
let weatherData=null; // {hours:[...],tmax,tmin}
let showPlanBar=false; // 天気の下の予定バーを出すか
// 天気コード → 絵文字＋説明
function wxIcon(code){
  if(code===0)return['☀️','はれ'];
  if([1,2].includes(code))return['🌤','はれ ときどき くもり'];
  if(code===3)return['☁️','くもり'];
  if([45,48].includes(code))return['🌫','きり'];
  if([51,53,55,56,57].includes(code))return['🌦','こさめ'];
  if([61,63,65,66,67,80,81,82].includes(code))return['🌧','あめ'];
  if([71,73,75,77,85,86].includes(code))return['❄️','ゆき'];
  if([95,96,99].includes(code))return['⛈','かみなり'];
  return['🌡',''];
}
// 白黒で見にくいので、色付きSVGアイコンを返す（太陽=オレンジ、くもり=グレー、雨=青、雪=水色、雷=紫）
function wxIconSvg(code){
  const sun='<circle cx="12" cy="12" r="5" fill="#fbbf24"/>'+
    [0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180;const x1=12+Math.cos(r)*7.5,y1=12+Math.sin(r)*7.5,x2=12+Math.cos(r)*9.5,y2=12+Math.sin(r)*9.5;return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>`;}).join('');
  const cloud=(col)=>`<path d="M7 16 a4 4 0 0 1 0.5 -7.9 a5 5 0 0 1 9.6 1.4 a3.5 3.5 0 0 1 -0.6 6.5 z" fill="${col}"/>`;
  const sunSmall='<circle cx="8" cy="8" r="3.2" fill="#fbbf24"/>';
  const rainDrops='<line x1="8" y1="17" x2="7" y2="21" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="17" x2="11" y2="21" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="17" x2="15" y2="21" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>';
  const snow='<text x="8" y="21" font-size="7" fill="#38bdf8">❄</text><text x="13" y="22" font-size="6" fill="#38bdf8">❄</text>';
  const bolt='<polygon points="11,16 14,16 10,23 12,18 9,18" fill="#a855f7"/>';
  let inner;
  if(code===0)inner=sun;                                  // 快晴
  else if([1,2].includes(code))inner=sunSmall+cloud('#cbd5e1');   // 晴れ時々曇り
  else if(code===3)inner=cloud('#94a3b8');                // 曇り（グレー）
  else if([45,48].includes(code))inner=cloud('#cbd5e1');  // 霧
  else if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code))inner=cloud('#93c5fd')+rainDrops; // 雨（青）
  else if([71,73,75,77,85,86].includes(code))inner=cloud('#bae6fd')+snow; // 雪
  else if([95,96,99].includes(code))inner=cloud('#94a3b8')+bolt;  // 雷
  else inner=cloud('#cbd5e1');
  return `<svg class="wx-svg" viewBox="0 0 24 24" width="26" height="26">${inner}</svg>`;
}
async function fetchWeather(){
  if(!weatherLoc||weatherLoc.lat==null)return;
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${weatherLoc.lat}&longitude=${weatherLoc.lon}&hourly=weathercode,precipitation_probability,temperature_2m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=1`;
    const r=await fetch(u);const j=await r.json();
    if(!j||!j.hourly)return;
    const H=j.hourly;
    // 6時〜22時を2時間おきに（スペースに合わせた粒度）
    const hours=[];
    for(let h=6;h<=22;h+=2){
      const idx=H.time.findIndex(t=>t.endsWith(String(h).padStart(2,'0')+':00'));
      if(idx>=0)hours.push({h,code:H.weathercode[idx],pop:H.precipitation_probability?H.precipitation_probability[idx]:null,temp:H.temperature_2m?Math.round(H.temperature_2m[idx]):null});
    }
    weatherData={
      hours,
      tmax:j.daily&&j.daily.temperature_2m_max?Math.round(j.daily.temperature_2m_max[0]):null,
      tmin:j.daily&&j.daily.temperature_2m_min?Math.round(j.daily.temperature_2m_min[0]):null
    };
    if(tab==='today')renderHeader();
  }catch(e){}
}
// 地名→緯度経度（ジオコーディング）
async function geocodeLoc(name){
  const u=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=ja&format=json`;
  const r=await fetch(u);const j=await r.json();
  if(j&&j.results&&j.results.length){const g=j.results[0];return{name:g.name+(g.admin1?'（'+g.admin1+'）':''),lat:g.latitude,lon:g.longitude};}
  return null;
}
function saveChangelog(){try{localStorage.setItem('maiken_changelog_v1',JSON.stringify(changelog))}catch(e){}queueLogSync()}

function mergeDays(remote){
  let n=0;
  Object.entries(remote||{}).forEach(([d,v])=>{
    const lc=days[d]?Object.keys(days[d].checks||{}).length:0;
    const rc=v?Object.keys(v.checks||{}).length:0;
    const ll=JSON.stringify(days[d]||{}).length, rl=JSON.stringify(v||{}).length;
    if(!days[d]||rc>lc||(rc===lc&&rl>ll)){days[d]=v;n++}
  });
  if(n){try{localStorage.setItem(LS_DAYS,JSON.stringify(days))}catch(e){}}
  return n;
}
async function autoPull(){
  try{
    const j=await pullCloudRaw();
    let changed=false;
    if(j&&j.days){if(mergeDays(j.days))changed=true;}
    // メニュー（予約含む）も同期：クラウドの更新時刻が この端末より新しければ採用
    if(j&&j.tasks){
      const cloudTs=Number(j.tasksTs||0);
      if(cloudTs>Number(tasksTs||0)){
        tasks=j.tasks;
        try{localStorage.setItem(LS_TASKS,JSON.stringify(tasks))}catch(e){}
        tasksTs=cloudTs;try{localStorage.setItem('maiken_tasksts_v1',JSON.stringify(tasksTs))}catch(e){}
        changed=true;
      }
    }
    if(changed)render();
  }catch(e){}
}

const ymd=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays=(s,n)=>{const[y,m,d]=s.split('-').map(Number);return ymd(new Date(y,m-1,d+n))};
const fmtJp=s=>{const[y,m,d]=s.split('-');const w=['日','月','火','水','木','金','土'][new Date(+y,+m-1,+d).getDay()];return`${+m}月${+d}日（${w}）`};

/* ── helpers ── */
const allTasks=()=>[...tasks.morning,...tasks.evening];
const REC_UNITS=['かい','びょう','ふん','センチ','メートル','キロ'];
// 予約：from(開始日)・to(終了日) はいずれも任意。dateにその日が含まれるか
function isTaskActive(t,date){
  if(t.from&&date<t.from)return false;
  if(t.to&&date>t.to)return false;
  return true;
}
// 今日（または指定日）有効なメニューだけ
function activeTasks(date){const dt=date||today;return allTasks().filter(t=>isTaskActive(t,dt));}
function activeIn(section,date){const dt=date||today;return tasks[section].filter(t=>isTaskActive(t,dt));}
const getDay=d=>days[d]||{checks:{},feels:{},records:{},declaration:'',diary:''};
function patchToday(p){days[today]={...getDay(today),...p};saveDays()}
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function streak(){
  let n=0,cur=today;
  if(Object.keys(getDay(cur).checks).length===0)cur=addDays(cur,-1);
  while(days[cur]&&Object.keys(days[cur].checks||{}).length>0){n++;cur=addDays(cur,-1)}
  return n;
}

    const g=id=>document.getElementById(id).value;
    const title=g('f-title').trim();
    if(!title){alert('タイトルを入れてね');return}
    const item={
      id:editing.index===-1?editing.section[0]+Date.now():tasks[editing.section][editing.index].id,
      icon:g('f-icon')||'⭐',title,desc:g('f-desc').trim(),
      min:Number(g('f-min'))||1,
    };
    const rl=g('f-rec').trim();if(rl)item.recordLabel=rl;
    const ru=document.getElementById('f-recunit');if(ru)item.recordUnit=ru.value;
    const vd=g('f-video').trim();if(vd)item.video=vd;
    // 入れ替え（新規時のみ）
    let swapIdx=-1, swapDate='';
    const swapEl=document.getElementById('f-swap');
    if(editing.index===-1&&swapEl&&swapEl.value!==''){
      swapIdx=Number(swapEl.value);
      swapDate=(document.getElementById('f-swapdate').value)||today;
      item.from=swapDate; // 新メニューは入れ替え日から
    }else{
      const ff=g('f-from');if(ff)item.from=ff;
    }
    const ft=g('f-to');if(ft)item.to=ft;
    if(editing.index===-1){
      // 入れ替え対象に終了日（入れ替え日の前日）をセット
      if(swapIdx>=0&&tasks[editing.section][swapIdx]){
        const old=tasks[editing.section][swapIdx];
        old.to=addDays(swapDate,-1);
        logChange('変更',old.title,'入れ替えのため '+old.to+'で終了');
      }
      const yoyaku=item.from?(' / '+item.from+'から'):'';
      const swp=swapIdx>=0?('（'+tasks[editing.section][swapIdx].title+'と入れ替え）'):'';
      logChange('追加',item.title,(item.min?item.min+'分':'')+(item.recordLabel?' / 記録:'+item.recordLabel:'')+yoyaku+swp);
      tasks[editing.section].push(item);
    }else{
      const before=tasks[editing.section][editing.index];
      const diffs=[];
      if(before.title!==item.title)diffs.push('タイトル「'+before.title+'」→「'+item.title+'」');
      if(before.desc!==item.desc)diffs.push('やり方を変更');
      if(before.min!==item.min)diffs.push('時間 '+before.min+'分→'+item.min+'分');
      if((before.recordLabel||'')!==(item.recordLabel||''))diffs.push('記録ラベル変更');
      if((before.video||'')!==(item.video||''))diffs.push('動画URL変更');
      if((before.from||'')!==(item.from||''))diffs.push(item.from?('開始日を'+item.from+'に設定'):'開始日の予約を解除');
      if((before.to||'')!==(item.to||''))diffs.push(item.to?('終了日を'+item.to+'に設定'):'終了日を解除');

      if(diffs.length)logChange('変更',item.title,diffs.join(' / '));
      tasks[editing.section][editing.index]=item;
    }
    if(pendingImg!==undefined){
      if(pendingImg===null)delete imgs[item.id];
      else imgs[item.id]=pendingImg;
      saveImgs();pendingImg=undefined;
    }

/* ── タイマー ── */
let timer=null;
function fmtT(s){const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0')}
function stopTimerIv(){if(timer&&timer.iv){clearInterval(timer.iv);timer.iv=null}}
function startTimerIv(){
  stopTimerIv();
  timer.iv=setInterval(()=>{
    timer.left--;
    if(timer.left<=0){timer.left=0;stopTimerIv();timer.running=false;beep();renderTimer();return}
    const e=document.getElementById('tm-time');
    if(e){e.textContent=fmtT(timer.left);
      const b=document.getElementById('tm-bar');
      if(b)b.style.width=(100*(1-timer.left/timer.total))+'%'}
  },1000);
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,.4,.8].forEach(t0=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(.4,ctx.currentTime+t0);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t0+.32);
      o.start(ctx.currentTime+t0);o.stop(ctx.currentTime+t0+.34);
    });
  }catch(e){}
}
function renderTimer(){
  if(!timer)return;
  const t=allTasks().find(x=>x.id===timer.taskId);
  const done=timer.left===0;
  document.getElementById('overlay').innerHTML=`<div class="modal-bg"><div class="timer-box">
    <div class="tm-title">${t?esc(t.icon+' '+t.title):''}</div>
    ${done
      ?`<div class="tm-done">⏰ おわり！がんばったね！</div>`
      :`<div class="tm-time" id="tm-time">${fmtT(timer.left)}</div>`}
    <div class="tm-track"><div class="tm-bar" id="tm-bar" style="width:${100*(1-timer.left/timer.total)}%"></div></div>
    <div class="m-btns">
      ${done
        ?`<button class="m-btn m-save" onclick="act.timerDone()">✅ できた！</button>`
        :`<button class="m-btn ${timer.running?'m-cancel':'m-save'}" onclick="act.timerToggle()">${timer.running?'⏸ ストップ':'▶ スタート'}</button>
           <button class="m-btn m-cancel" onclick="act.timerReset()">↺ さいしょから</button>`}
      <button class="m-btn m-cancel" onclick="act.timerClose()">とじる</button>
    </div>
  </div></div>`;
}

function weatherStripHtml(){
  if(!weatherData||!weatherData.hours||!weatherData.hours.length)return '';
  const WX_START=6, WX_END=22, SPAN=WX_END-WX_START; // 16時間
  // 天気コマ（2時間おき）：時間軸グリッド上に配置
  const nowH=new Date().getHours();
  const cells=weatherData.hours.map(s=>{
    const col=(s.h-WX_START)+1; // grid列（1始まり）
    const isNow=(nowH>=s.h&&nowH<s.h+2); // この2時間枠に現在時刻が入る
    const rain=(s.pop!=null&&s.pop>=20)?`<div class="wx-pop">☔${s.pop}%</div>`:`<div class="wx-pop dim">${s.pop!=null?s.pop+'%':''}</div>`;
    return `<div class="wx-hour ${isNow?'now':''}" style="grid-column:${col} / span 2"><div class="wx-h">${s.h}時</div><div class="wx-ic">${wxIconSvg(s.code)}</div>${s.temp!=null?`<div class="wx-t">${s.temp}°</div>`:''}${rain}</div>`;
  }).join('');
  const tmax=(weatherData.tmax!=null)?`<span class="wx-hi">最高 ${weatherData.tmax}°</span>`:'';
  const tmin=(weatherData.tmin!=null)?`<span class="wx-lo">最低 ${weatherData.tmin}°</span>`:'';

  // 今日の予定を同じ時間軸でバー表示
  const todayDow=new Date().getDay();
  const todays=(plans||[]).filter(p=>p.day===todayDow).sort((a,b)=>toMin(a.start)-toMin(b.start));
  let planRow='';
  if(todays.length){
    const bars=todays.map(p=>{
      const sH=toMin(p.start)/60, eH=toMin(p.end)/60;
      let cs=Math.max(sH,WX_START), ce=Math.min(eH,WX_END);
      if(ce<=cs)return ''; // 表示範囲外
      // グリッド列は整数（時間）に丸める：開始は切り捨て、終了は切り上げ
      const csI=Math.floor(cs), ceI=Math.ceil(ce);
      const col=(csI-WX_START)+1; const span=Math.max(ceI-csI,1);
      const col0=p.color||'#64748b';
      return `<div class="wx-plan" style="grid-column:${col} / span ${span};background:${col0}" title="${esc(p.title)} ${esc(p.start)}-${esc(p.end)}"><span>${esc(p.title)}</span></div>`;
    }).join('');
    planRow=`<div class="wx-planrow">${bars}</div>`;
  }

  const planToggle=todays.length?`<button class="wx-plantoggle" onclick="act.togglePlanBar()">${showPlanBar?'よてい ▲':'よてい ▼'}</button>`:'';
  return `<div class="wx-box">
    <div class="wx-top">
      <div class="wx-info">
        <a class="wx-loc" href="https://weather.yahoo.co.jp/weather/search/?p=${encodeURIComponent((weatherLoc.name||'').replace(/（.*$/,''))}" target="_blank" rel="noopener" title="Yahoo!天気で この地点を見る">📍${esc(weatherLoc.name)} 🔗</a>
        <span class="wx-range" onclick="act.setTab('settings')" title="地点はせっていで変更">${tmax} ${tmin}</span>
      </div>
      ${planToggle}
    </div>
    <div class="wx-scroll">
      <div class="wx-grid">${cells}</div>
      ${showPlanBar?planRow:''}
    </div>
  </div>`;
}

function viewLog(){
  const total=allTasks().length;
  /* heat 14d */
  let heat='';
  for(let i=13;i>=0;i--){
    const dd=addDays(today,-i);const c=Object.keys(getDay(dd).checks).length;
    const p=total?c/total:0;
    const bg=p===0?'#f1f5f9':`linear-gradient(135deg,rgba(251,146,60,${.25+p*.75}),rgba(244,63,94,${.2+p*.6}))`;
    heat+=`<div class="heat-cell"><div class="heat-box" style="background:${bg}" title="${dd}: ${Math.round(p*100)}%"></div><div class="heat-d">${+dd.slice(8)}</div></div>`;
  }
  /* week bars */
  let bars='';let maxC=1;
  const wk=[];
  for(let i=6;i>=0;i--){const dd=addDays(today,-i);const c=Object.keys(getDay(dd).checks).length;wk.push([dd,c]);if(c>maxC)maxC=c}
  wk.forEach(([dd,c])=>{
    bars+=`<div class="bar-col"><div class="bar-v">${c||''}</div><div class="bar" style="height:${c/Math.max(maxC,total)*100}%"></div><div class="bar-d">${dd.slice(5).replace('-','/')}</div></div>`;
  });
  /* record line */
  const recTask=allTasks().find(t=>t.recordLabel);
  let recHtml='';
  if(recTask){
    const pts=Object.entries(days).filter(([,v])=>v.records&&v.records[recTask.id]!=null)
      .sort(([a],[b])=>a<b?-1:1).slice(-20)
      .map(([dd,v])=>({d:dd.slice(5).replace('-','/'),v:v.records[recTask.id]}));
    let inner;
    if(pts.length===0)inner=`<div class="empty">まだ きろくが ないよ。チェックしたら 数字を いれてみよう！</div>`;
    else{
      const W=640,H=150,pad=28;
      const maxV=Math.max(...pts.map(p=>p.v),1);
      const x=i=>pts.length===1?W/2:pad+i*(W-pad*2)/(pts.length-1);
      const y=v=>H-18-(v/maxV)*(H-40);
      const line=pts.map((p,i)=>`${i?'L':'M'}${x(i)},${y(p.v)}`).join(' ');
      const dots=pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="4.5" fill="#8b5cf6"/><text x="${x(i)}" y="${y(p.v)-9}" font-size="11" font-weight="900" fill="#7c3aed" text-anchor="middle">${p.v}</text>`).join('');
      const labels=pts.map((p,i)=>(pts.length<=8||i%2===0)?`<text x="${x(i)}" y="${H-4}" font-size="9" fill="#94a3b8" text-anchor="middle">${p.d}</text>`:'').join('');
      inner=`<svg class="line-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <path d="${line}" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>${dots}${labels}</svg>`;
    }
    recHtml=`<div class="card"><div class="card-title">🏅 ${esc(recTask.title)} の きろく</div>${inner}</div>`;
  }
  /* signals */
  const sig={};
  Object.values(days).forEach(v=>Object.entries(v.feels||{}).forEach(([id,f])=>{
    if(!f)return;sig[id]=sig[id]||{love:0,ok:0,meh:0};sig[id][f]++;
  }));
  const sigRows=allTasks().map(t=>({t,...(sig[t.id]||{love:0,ok:0,meh:0})}))
    .filter(x=>x.love+x.ok+x.meh>0).sort((a,b)=>b.love-a.love);
  const sigHtml=sigRows.length===0
    ?`<div class="empty">チェック後の「きもち」が たまると ここに 出ます</div>`
    :sigRows.map(s=>`<div class="sig-row"><span>${s.t.icon}</span><span class="name">${esc(s.t.title)}</span>
       <span class="sig-love">😆×${s.love}</span><span class="sig-sub">🙂×${s.ok}</span><span class="sig-sub">😮‍💨×${s.meh}</span></div>`).join('')
     +`<div class="sig-note">😆が多いメニュー＝投資候補。😮‍💨が続くメニューは形を変えるか入れ替えを検討（3ヶ月ルール）</div>`;
  /* diaries */
  const dEnts=Object.entries(days).filter(([,v])=>v.diary||v.declaration).sort(([a],[b])=>a>b?-1:1).slice(0,7);
  const dHtml=dEnts.length===0
    ?`<div class="empty">にっきを かくと ここに たまっていくよ</div>`
    :dEnts.map(([dd,v])=>`<div class="diary-row"><span class="diary-d">${fmtJp(dd)}</span>
      ${v.declaration?`<div>📣 ${esc(v.declaration)}</div>`:''}
      ${v.diary?`<div class="diary-t">📔 ${esc(v.diary)}</div>`:''}</div>`).join('');

  const totalDone=Object.values(days).reduce((a,v)=>a+Object.keys(v.checks||{}).length,0);
  return`
    <div class="stat-row">
      <div class="stat"><div class="ico">🔥</div><div class="v">${streak()}日</div><div class="l">れんぞく</div></div>
      <div class="stat"><div class="ico">✅</div><div class="v">${totalDone}</div><div class="l">クリアした かず</div></div>
      <div class="stat"><div class="ico">📅</div><div class="v">${Object.keys(days).length}日</div><div class="l">きろくした 日</div></div>
    </div>
    <div class="card"><div class="card-title">🗓 この2週間</div><div class="heat">${heat}</div></div>
    <div class="card"><div class="card-title">📊 1しゅうかんの たっせい</div><div class="bars">${bars}</div></div>
    ${recHtml}
    <div class="card"><div class="card-title">🔍 ねっちゅうシグナル（おうちのひと向け）</div>${sigHtml}</div>
    <div class="card"><div class="card-title">📔 さいきんの きろく</div>${dHtml}</div>`;
}

/* ============================================
 *  レポート機能（記録 → 示唆）
 * ============================================ */
function analyzePeriod(nDays){
  const all=allTasks();
  const start=addDays(today,-(nDays-1));
  // 対象日のリスト
  const dates=[];for(let i=nDays-1;i>=0;i--)dates.push(addDays(today,-i));
  const recs=dates.map(d=>({d,v:days[d]}));

  const activeDays=recs.filter(r=>r.v&&Object.keys(r.v.checks||{}).length>0).length;
  const totalPossible=nDays*all.length;
  let totalDone=0;
  recs.forEach(r=>{if(r.v)totalDone+=Object.keys(r.v.checks||{}).length});
  const avgRate=totalPossible?totalDone/totalPossible:0;
  const activeRate=nDays?activeDays/nDays:0;

  // メニュー別 実施回数・気持ち集計
  const per={};
  all.forEach(t=>per[t.id]={task:t,done:0,love:0,ok:0,meh:0});
  recs.forEach(r=>{
    if(!r.v)return;
    Object.keys(r.v.checks||{}).forEach(id=>{if(per[id])per[id].done++});
    Object.entries(r.v.feels||{}).forEach(([id,f])=>{if(per[id]&&f)per[id][f]++});
  });
  const perArr=Object.values(per);

  // 前半 vs 後半（伸び）
  const half=Math.floor(nDays/2);
  const firstHalf=recs.slice(0,half), secondHalf=recs.slice(half);
  const sum=arr=>arr.reduce((a,r)=>a+(r.v?Object.keys(r.v.checks||{}).length:0),0);
  const fhAvg=firstHalf.length?sum(firstHalf)/firstHalf.length:0;
  const shAvg=secondHalf.length?sum(secondHalf)/secondHalf.length:0;
  const trend=shAvg-fhAvg;

  // 記録系（リフティング等）の伸び
  const recTasks=all.filter(t=>t.recordLabel);
  const recordProgress=recTasks.map(t=>{
    const pts=recs.filter(r=>r.v&&r.v.records&&r.v.records[t.id]!=null).map(r=>({d:r.d,v:r.v.records[t.id]}));
    if(pts.length<1)return{task:t,pts:[],first:null,last:null,best:null};
    return{task:t,pts,first:pts[0].v,last:pts[pts.length-1].v,best:Math.max(...pts.map(p=>p.v))};
  });

  // 曜日別達成
  const dow=[0,0,0,0,0,0,0],dowCnt=[0,0,0,0,0,0,0];
  recs.forEach(r=>{
    const [y,m,dd]=r.d.split('-').map(Number);
    const w=new Date(y,m-1,dd).getDay();
    dowCnt[w]++;
    if(r.v)dow[w]+=Object.keys(r.v.checks||{}).length;
  });
  const dowAvg=dow.map((s,i)=>dowCnt[i]?s/dowCnt[i]:0);

  return{nDays,start,end:today,dates,recs,activeDays,activeRate,totalDone,avgRate,perArr,trend,fhAvg,shAvg,recordProgress,dowAvg,all};
}

function buildInsights(a){
  const ins=[];
  // 継続性
  if(a.activeRate>=0.85)ins.push(['good','🔥',`${a.nDays}日のうち${a.activeDays}日 実施。習慣がしっかり定着しています。`]);
  else if(a.activeRate>=0.5)ins.push(['warn','📌',`実施は${a.activeDays}/${a.nDays}日。「ゼロの日を作らない」を意識すると、もう一段定着します。`]);
  else if(a.activeDays>0)ins.push(['warn','💡',`実施が${a.activeDays}/${a.nDays}日とまばら。メニューを減らすか、朝1つ・夜1つの「最小セット」から立て直すのが有効です。`]);

  // 伸び
  if(a.trend>0.5)ins.push(['good','📈',`期間後半は前半より1日あたり+${a.trend.toFixed(1)}メニュー増加。勢いがついています。`]);
  else if(a.trend<-0.5)ins.push(['warn','📉',`後半に失速（1日あたり${a.trend.toFixed(1)}）。飽きのサインかも。メニュー入れ替えの検討時期です。`]);

  // 記録の伸び
  a.recordProgress.forEach(rp=>{
    if(rp.pts.length>=2){
      const diff=rp.last-rp.first;
      if(diff>0)ins.push(['good','🏅',`「${rp.task.title}」の記録が ${rp.first}→${rp.last}（ベスト${rp.best}）。明確に伸びています。`]);
      else if(diff<0)ins.push(['warn','🤔',`「${rp.task.title}」の記録が伸び悩み（ベスト${rp.best}）。やり方の図解を見直すか、難易度を一段変えると良いかも。`]);
    }
  });

  // 熱中シグナル（love多い）
  const loved=a.perArr.filter(p=>p.love>0).sort((x,y)=>y.love-x.love);
  if(loved.length){
    const top=loved[0];
    ins.push(['idea','😆',`「${top.task.title}」に😆が${top.love}回。ここが投資先候補。時間を増やす／レベルアップ版に進化させると伸びます。`]);
  }
  // いやがるシグナル（meh多い）
  const disliked=a.perArr.filter(p=>p.meh>=2&&p.meh>=p.love).sort((x,y)=>y.meh-x.meh);
  if(disliked.length){
    const top=disliked[0];
    ins.push(['warn','😮‍💨',`「${top.task.title}」に😮‍💨が${top.meh}回。やり方を変える・別メニューに置き換える・一旦休むのいずれかを検討。`]);
  }
  // ほぼ手付かずのメニュー
  const neglected=a.perArr.filter(p=>p.done<=Math.max(1,a.nDays*0.1));
  if(neglected.length&&a.activeDays>3){
    ins.push(['warn','⚠️',`ほとんど実施されていないメニュー：${neglected.map(p=>p.task.title).join('、')}。続かない理由（難しい/つまらない/時間が合わない）を本人に聞いてみましょう。`]);
  }
  // 曜日の谷
  const minDow=a.dowAvg.indexOf(Math.min(...a.dowAvg.filter((_,i)=>a.dowAvg[i]>=0)));
  const wn=['日','月','火','水','木','金','土'];
  const maxAvg=Math.max(...a.dowAvg);
  if(maxAvg>0&&a.dowAvg[minDow]<maxAvg*0.5){
    ins.push(['idea','🗓',`${wn[minDow]}曜の達成が低め。習い事や疲れと重なっていないか確認し、その曜日だけ軽いメニューにするのも手です。`]);
  }
  if(ins.length===0)ins.push(['idea','🌱','まだ示唆を出すにはデータが少なめ。まずは1〜2週間 記録を続けてみましょう。']);
  return ins;
}

function viewSchedule(){
  const wn=['日','月','火','水','木','金','土'];
  const todayDow=new Date().getDay();
  const START=6, END=22; // 表示する時間帯 6:00-22:00
  const STEP=5; // 分
  const slotH=5; // px / 5min
  const rows=(END-START)*60/STEP;

  // 時間目盛り列
  let timeCol='<div class="gcol timecol"><div class="gh corner">時</div>';
  for(let r=0;r<rows;r++){
    const min=START*60+r*STEP;const isHour=min%60===0;const isHalf=min%30===0;
    timeCol+=`<div class="gtime ${isHour?'hour':isHalf?'half':''}">${isHour?toHHMM(min):''}</div>`;
  }
  timeCol+='</div>';

  // 各曜日の列
  let cols='';
  for(let idx=0;idx<7;idx++){
    const d=(weekStart+idx)%7;
    let cells='';
    for(let r=0;r<rows;r++){
      const min=START*60+r*STEP;const isHour=min%60===0;const isHalf=min%30===0;
      cells+=`<div class="gcell ${isHour?'hour':isHalf?'half':''}" onclick="act.newPlan(${d},${min})"></div>`;
    }
    // この曜日の予定を重ねる
    let evs='';
    plans.filter(p=>p.day===d).forEach(p=>{
      const s=toMin(p.start),e=toMin(p.end);
      const top=(s-START*60)/STEP*slotH;
      const h=Math.max((e-s)/STEP*slotH-2,12);
      const col=p.color||'#64748b';
      evs+=`<div class="ev" style="top:${top}px;height:${h}px;background:${col}" onclick="event.stopPropagation();act.editPlan('${p.id}')">
        <div class="et">${esc(p.title)}</div>
        ${h>26&&p.place?`<div class="ep">📍${esc(p.place)}</div>`:''}
        ${h>40?`<div class="ep">${esc(p.start)}-${esc(p.end)}</div>`:''}
      </div>`;
    });
    const notes=dayNotes[d]||[];
    const noteBadge=notes.length?`<span class="gh-badge">📌${notes.length}</span>`:'<span class="gh-badge add">＋</span>';
    // 今日だけ、現在時刻の赤いライン
    let nowLine='';
    if(d===todayDow){
      const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
      if(nowMin>=START*60&&nowMin<=END*60){
        const topPx=(nowMin-START*60)/STEP*slotH;
        nowLine=`<div class="now-line" style="top:${topPx}px"><span class="now-dot"></span></div>`;
      }
    }
    cols+=`<div class="gcol"><div class="gh ${d===todayDow?'today':''}" onclick="act.openDayNotes(${d})" style="cursor:pointer">${wn[d]} ${noteBadge}</div><div style="position:relative">${cells}${evs}${nowLine}</div></div>`;
  }

  // 色の凡例
  const legend=PLAN_COLORS.map(c=>`<div class="leg"><span class="ld" style="background:${c.c}"></span>${esc(c.name)}</div>`).join('');

  return `
    <div class="sch-toolbar">
      <div class="st-title">🗓 1しゅうかんの よてい</div>
      <div style="display:flex;align-items:center;gap:8px">
        <select onchange="act.setWeekStart(this.value)" style="font-family:inherit;font-weight:700;font-size:11px;border:none;border-radius:99px;padding:7px 10px;background:rgba(255,255,255,.15);color:#fff">
          ${['日','月','火','水','木','金','土'].map((w,i)=>`<option value="${i}" ${weekStart===i?'selected':''} style="color:#1e293b">${w}曜はじまり</option>`).join('')}
        </select>
        <button class="sch-addbtn" onclick="act.newPlan()">＋ ついか</button>
      </div>
    </div>

function viewReport(){
  const a=analyzePeriod(repDays);
  const pct=Math.round(a.avgRate*100);
  const actPct=Math.round(a.activeRate*100);
  const trendTxt=a.trend>0.2?['up','▲ 上昇中']:a.trend<-0.2?['dn','▼ 失速ぎみ']:['fl','→ 横ばい'];
  const ins=buildInsights(a);

  // mini bars（直近14日 or 期間が短ければその日数）
  const showN=Math.min(a.nDays,14);
  const barDays=a.recs.slice(-showN);
  const maxC=Math.max(a.all.length,1);
  const bars=barDays.map(r=>{
    const c=r.v?Object.keys(r.v.checks||{}).length:0;
    return `<div class="mini-col"><div class="mini-bar" style="height:${c/maxC*100}%"></div><div class="mini-d">${+r.d.slice(8)}</div></div>`;
  }).join('');

  const insHtml=ins.map(([type,ico,txt])=>{
    const cls=type==='good'?'ins-good':type==='warn'?'ins-warn':'ins-idea';
    return `<div class="ins-item"><span class="ins-ico">${ico}</span><span><span class="${cls}">●</span> ${esc(txt)}</span></div>`;
  }).join('');

  const periodBtn=(n,l)=>`<button class="rep-pill ${repDays===n?'on':''}" onclick="act.setRepDays(${n})">${l}</button>`;

  return `
    <div class="rep-head">
      <div class="rt">📋 つみかさねレポート</div>
      <div class="rs">${fmtJp(a.start)} 〜 ${fmtJp(a.end)}</div>
      <div class="rep-period">${periodBtn(7,'1週間')}${periodBtn(30,'1ヶ月')}${periodBtn(90,'3ヶ月')}</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kl">じっしした日</div><div class="kv">${a.activeDays}<span style="font-size:13px">/${a.nDays}日</span></div><div class="kt ${actPct>=70?'up':actPct>=40?'fl':'dn'}">継続率 ${actPct}%</div></div>
      <div class="kpi"><div class="kl">へいきん達成率</div><div class="kv">${pct}<span style="font-size:13px">%</span></div><div class="kt ${trendTxt[0]}">${trendTxt[1]}</div></div>
      <div class="kpi"><div class="kl">クリアした合計</div><div class="kv">${a.totalDone}<span style="font-size:13px">こ</span></div><div class="kt fl">毎日${a.all.length}こ中</div></div>
      <div class="kpi"><div class="kl">最高記録</div><div class="kv">${a.recordProgress[0]&&a.recordProgress[0].best!=null?a.recordProgress[0].best:'—'}</div><div class="kt fl">${a.recordProgress[0]?esc(a.recordProgress[0].task.title):'記録メニューなし'}</div></div>
    </div>

    <div class="insight">
      <div class="it">📊 達成のながれ（直近${showN}日）</div>
      <div class="mini-bars">${bars}</div>
    </div>

    <div class="insight">
      <div class="it">🔍 自動分析と気づき</div>
      ${insHtml}
    </div>

    <div class="rep-btns">
      <button class="rep-btn print" onclick="act.printReport()">🖨 レポートを印刷 / PDF保存</button>
      <button class="rep-btn ai" onclick="act.aiReport()">🤖 AIに相談する文章をコピー</button>
    </div>

  `;
}

let showAllChangelog=false;
function recChartSvg(task){
  const unit=task.recordUnit||'かい';
  const pts=Object.entries(days).filter(([,v])=>v.records&&v.records[task.id]!=null).sort(([a],[b])=>a<b?-1:1).slice(-20).map(([dd,v])=>({d:dd.slice(5).replace('-','/'),v:v.records[task.id]}));
  if(pts.length===0)return `<div class="empty">まだ きろくが ないよ</div>`;
  const best=Math.max(...pts.map(p=>p.v));
  const W=640,H=150,pad=28;const maxV=Math.max(best,1);
  const x=i=>pts.length===1?W/2:pad+i*(W-pad*2)/(pts.length-1);const y=v=>H-18-(v/maxV)*(H-40);
  const line=pts.map((p,i)=>`${i?'L':'M'}${x(i)},${y(p.v)}`).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="4.5" fill="#8b5cf6"/><text x="${x(i)}" y="${y(p.v)-9}" font-size="11" font-weight="900" fill="#7c3aed" text-anchor="middle">${p.v}</text>`).join('');
  const labels=pts.map((p,i)=>(pts.length<=8||i%2===0)?`<text x="${x(i)}" y="${H-4}" font-size="9" fill="#94a3b8" text-anchor="middle">${p.d}</text>`:'').join('');
  const svg=`<svg class="line-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${line}" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>${dots}${labels}</svg>`;
  return `<div class="rec-best">さいこうきろく：<b>${best}${esc(unit)}</b></div>${svg}`;
}

    <h3>🏅 いろんな きろく</h3>

    <div class="m-btns"><button class="m-btn m-save" onclick="act.closeRecords()">とじる</button></div>
  </div></div>`;
}
let showAllDiary=false;
function changelogHtml(){
  if(!changelog||!changelog.length)return '<div class="empty">メニューを 追加・変更すると ここに きろくが のこります</div>';
  const icon={'追加':'➕','変更':'✏️','削除':'🗑'};
  const rowHtml=function(e){
    return `<div class="clog-item"><div class="clog-t">${esc(e.t)}</div><div class="clog-body"><span class="clog-type ${e.type==='削除'?'del':e.type==='追加'?'add':'edit'}">${icon[e.type]||''} ${esc(e.type)}</span> <b>${esc(e.name)}</b>${e.detail?`<div class="clog-detail">${esc(e.detail)}</div>`:''}</div></div>`;
  };
  const all=changelog.slice(0,30);
  const shown=showAllChangelog?all:all.slice(0,3);
  let html='<div class="clog-list">'+shown.map(rowHtml).join('')+'</div>';
  if(all.length>3){
    html+=`<div class="clog-more" onclick="act.toggleChangelog()">${showAllChangelog?'▲ とじる':'▼ もっと見る（あと '+(all.length-3)+'件）'}</div>`;
  }
  return html;
}

// きろくタブ：レポートとログを重複なく1本に統合
function viewReportAndLog(){
  const a=analyzePeriod(repDays);
  const pct=Math.round(a.avgRate*100), actPct=Math.round(a.activeRate*100);
  const trendTxt=a.trend>0.2?['up','▲ 上昇中']:a.trend<-0.2?['dn','▼ 失速ぎみ']:['fl','→ 横ばい'];
  const ins=buildInsights(a);
  const total=allTasks().length;
  const periodBtn=(n,l)=>`<button class="rep-pill ${repDays===n?'on':''}" onclick="act.setRepDays(${n})">${l}</button>`;

  // ヒートマップ（直近14日）
  let heat='';
  for(let i=13;i>=0;i--){const dd=addDays(today,-i);const c=Object.keys(getDay(dd).checks).length;const p=total?c/total:0;
    const bg=p===0?'#f1f5f9':`linear-gradient(135deg,rgba(251,146,60,${.25+p*.75}),rgba(244,63,94,${.2+p*.6}))`;
    heat+=`<div class="heat-cell"><div class="heat-box" style="background:${bg}" title="${dd}: ${Math.round(p*100)}%"></div><div class="heat-d">${+dd.slice(8)}</div></div>`;}

  // 週間グラフ（1週間の達成）— レポートのmini-barsはこれに統一
  let bars='';let maxC=1;const wk=[];
  for(let i=6;i>=0;i--){const dd=addDays(today,-i);const c=Object.keys(getDay(dd).checks).length;wk.push([dd,c]);if(c>maxC)maxC=c;}
  wk.forEach(([dd,c])=>{bars+=`<div class="bar-col"><div class="bar-v">${c||''}</div><div class="bar" style="height:${c/Math.max(maxC,total)*100}%"></div><div class="bar-d">${dd.slice(5).replace('-','/')}</div></div>`;});

  // 記録メニュー → 「いろんなきろく」ボタン
  const recTasksAll=allTasks().filter(t=>t.recordLabel);
  let recHtml='';
  if(recTasksAll.length){
    recHtml=`<div class="card"><div class="card-title">🏅 きろく</div>
      <button class="rep-btn" style="background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;width:100%" onclick="act.openRecords()">🏅 いろんな きろくを 見る（${recTasksAll.length}こ）</button>
    </div>`;
  }

  // 熱中シグナル
  const sig={};
  Object.values(days).forEach(v=>Object.entries(v.feels||{}).forEach(([id,f])=>{if(!f)return;sig[id]=sig[id]||{love:0,ok:0,meh:0};sig[id][f]++;}));
  const sigRows=allTasks().map(t=>({t,...(sig[t.id]||{love:0,ok:0,meh:0})})).filter(x=>x.love+x.ok+x.meh>0).sort((a,b)=>b.love-a.love);
  const sigHtml=sigRows.length===0?`<div class="empty">チェック後の「きもち」が たまると ここに 出ます</div>`
    :sigRows.map(s=>`<div class="sig-row"><span>${s.t.icon}</span><span class="name">${esc(s.t.title)}</span><span class="sig-love">😆×${s.love}</span><span class="sig-sub">🙂×${s.ok}</span><span class="sig-sub">😮‍💨×${s.meh}</span></div>`).join('')+`<div class="sig-note">😆が多いメニュー＝投資候補。😮‍💨が続くメニューは形を変えるか入れ替えを検討（3ヶ月ルール）</div>`;

  // 日記（常時3件＋展開）
  const dAll=Object.entries(days).filter(([,v])=>v.diary||v.declaration).sort(([a],[b])=>a>b?-1:1).slice(0,30);
  const diaryRow=([dd,v])=>`<div class="diary-row"><span class="diary-d">${fmtJp(dd)}</span>${v.declaration?`<div>📣 ${esc(v.declaration)}</div>`:''}${v.diary?`<div class="diary-t">📔 ${esc(v.diary)}</div>`:''}</div>`;
  let dHtml;
  if(dAll.length===0)dHtml=`<div class="empty">にっきを かくと ここに たまっていくよ</div>`;
  else{
    const dShown=showAllDiary?dAll:dAll.slice(0,3);
    dHtml=dShown.map(diaryRow).join('');
    if(dAll.length>3)dHtml+=`<div class="clog-more" onclick="act.toggleDiaryList()">${showAllDiary?'▲ とじる':'▼ もっと見る（あと '+(dAll.length-3)+'件）'}</div>`;
  }

  const insHtml=ins.map(([type,ico,txt])=>{const cls=type==='good'?'ins-good':type==='warn'?'ins-warn':'ins-idea';return `<div class="ins-item"><span class="ins-ico">${ico}</span><span><span class="${cls}">●</span> ${esc(txt)}</span></div>`;}).join('');

  return `
    <div class="rep-head">
      <div class="rt">📈 つみかさねレポート</div>
      <div class="rs">${fmtJp(a.start)} 〜 ${fmtJp(a.end)}</div>
      <div class="rep-period">${periodBtn(7,'1週間')}${periodBtn(30,'1ヶ月')}${periodBtn(90,'3ヶ月')}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kl">じっしした日</div><div class="kv">${a.activeDays}<span style="font-size:13px">/${a.nDays}日</span></div><div class="kt ${actPct>=70?'up':actPct>=40?'fl':'dn'}">継続率 ${actPct}%</div></div>
      <div class="kpi"><div class="kl">へいきん達成率</div><div class="kv">${pct}<span style="font-size:13px">%</span></div><div class="kt ${trendTxt[0]}">${trendTxt[1]}</div></div>
      <div class="kpi"><div class="kl">クリアした合計</div><div class="kv">${a.totalDone}<span style="font-size:13px">こ</span></div><div class="kt fl">毎日${a.all.length}こ中</div></div>
      <div class="kpi"><div class="kl">最高記録</div><div class="kv">${a.recordProgress[0]&&a.recordProgress[0].best!=null?a.recordProgress[0].best:'—'}</div><div class="kt fl">${a.recordProgress[0]?esc(a.recordProgress[0].task.title):'記録メニューなし'}</div></div>
    </div>
    <div class="card"><div class="card-title">🗓 この2週間</div><div class="heat">${heat}</div></div>
    <div class="card"><div class="card-title">📊 1しゅうかんの たっせい</div><div class="bars">${bars}</div></div>
    ${recHtml}
    <div class="insight"><div class="it">🔍 自動分析と気づき</div>${insHtml}</div>
    <div class="card"><div class="card-title">🔥 ねっちゅうシグナル（おうちのひと向け）</div>${sigHtml}</div>
    <div class="card"><div class="card-title">📔 さいきんの きろく</div>${dHtml}</div>
    <div class="card"><div class="card-title">📝 メニューの あゆみ（変更りれき）</div>${changelogHtml()}</div>
    <div class="rep-btns">
      <button class="rep-btn print" onclick="act.printReport()">🖨 レポートを印刷 / PDF保存</button>
      <button class="rep-btn ai" onclick="act.aiReport()">🤖 AIに相談する文章をコピー</button>
    </div>
    <div class="rep-note">「AIに相談する文章をコピー」を押すと、この期間のデータと背景をまとめた文章がコピーされます。ChatGPTやClaude等に貼り付けると、メニューの進化やレベルアップの提案など、より詳しいアドバイスが受け取れます。</div>
  `;
}

/* ── AI相談プロンプト生成 ── */
function buildAiPrompt(a){
  const wn=['日','月','火','水','木','金','土'];
  const L=[];
  L.push('あなたは子どもの運動・学習の習慣化を支援するコーチです。以下は小学1年生の男の子の家庭での日課記録です。データを分析し、(1)良い点 (2)課題 (3)メニューの具体的な改善・進化の提案（既存メニューのレベルアップ案、入れ替え案、新メニュー案）を、保護者向けに提案してください。');
  L.push('');
  L.push('# 背景・方針');
  L.push('- 習い事: サッカー(週2)、空手(週1)、バスケ(週2)。まだ突出した熱中対象はない段階。');
  L.push('- 教育方針: 強みを伸ばす／いろんな経験をさせる／熱中しないものはスパッと切り、のめり込めるものに投資。学習は暗記でなく概念理解を重視。');
  L.push('- 身体的特徴: クラスで2番目に背が高い。体幹が弱め。');
  L.push('- 運用思想: 「枠は厳しく、評価は温かく」。ゼロの日を作らない。3ヶ月ごとにメニュー見直し。');
  L.push('- 家でできること中心（マンション2階・下が駐車場なので跳躍・ドリブル音はOK）。');
  L.push('');
  L.push('# 集計期間');
  L.push(`${a.start} 〜 ${a.end}（${a.nDays}日間）`);
  L.push('');
  L.push('# サマリー');
  L.push(`- 実施した日: ${a.activeDays}/${a.nDays}日（継続率${Math.round(a.activeRate*100)}%）`);
  L.push(`- 平均達成率: ${Math.round(a.avgRate*100)}%（毎日${a.all.length}メニュー中）`);
  L.push(`- 累計クリア数: ${a.totalDone}`);
  L.push(`- 前半→後半の傾向: 1日あたり ${a.trend>=0?'+':''}${a.trend.toFixed(1)} メニュー`);
  L.push('');
  L.push('# メニュー別の実施回数と本人の気持ち（😆もっとやりたい / 🙂ふつう / 😮‍💨いやだった）');
  a.perArr.forEach(p=>{
    L.push(`- ${p.task.title}（目安${p.task.min}分）: 実施${p.done}回, 😆${p.love} 🙂${p.ok} 😮‍💨${p.meh}`);
  });
  L.push('');
  if(a.recordProgress.some(r=>r.pts.length)){
    L.push('# 数値記録の推移');
    a.recordProgress.forEach(rp=>{
      if(rp.pts.length)L.push(`- ${rp.task.title}: 最初${rp.first} → 最新${rp.last}（ベスト${rp.best}）`);
    });
    L.push('');
  }
  L.push('# 曜日別の平均達成メニュー数');
  L.push(a.dowAvg.map((v,i)=>`${wn[i]}:${v.toFixed(1)}`).join(' / '));
  L.push('');
  // 本人の声（宣言・日記）
  const voices=a.recs.filter(r=>r.v&&(r.v.declaration||r.v.diary)).slice(-10);
  if(voices.length){
    L.push('# 本人の声（宣言・ふりかえり日記の抜粋）');
    voices.forEach(r=>{
      if(r.v.declaration)L.push(`- ${r.d} 宣言: ${r.v.declaration}`);
      if(r.v.diary)L.push(`- ${r.d} 日記: ${r.v.diary}`);
    });
    L.push('');
  }
  L.push('# お願いしたいこと');
  L.push('1. 上記から読み取れる「強み・熱中の芽」と「つまずき」を指摘してください。');
  L.push('2. 😆が多いメニューはどう発展させるべきか、具体的なレベルアップ版を提案してください。');
  L.push('3. 😮‍💨が多い/実施が少ないメニューは、やり方変更・入れ替え・新メニューのどれが良いか提案してください。');
  L.push('4. この子の年齢・方針・体幹の弱さを踏まえ、次の1ヶ月で試す価値のある新メニューを2〜3個、具体的なやり方つきで提案してください。');
  return L.join('\n');
}

/* ── 印刷用レポート（別ウィンドウ） ── */
function openPrintReport(a){
  const wn=['日','月','火','水','木','金','土'];
  const pct=Math.round(a.avgRate*100), actPct=Math.round(a.activeRate*100);
  const ins=buildInsights(a);
  // 日次バー
  const maxC=Math.max(a.all.length,1);
  const dayBars=a.recs.map(r=>{
    const c=r.v?Object.keys(r.v.checks||{}).length:0;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:flex-end">
      <div style="width:100%;max-width:18px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#38bdf8,#6366f1);height:${c/maxC*70}px;min-height:2px"></div>
      <div style="font-size:7px;color:#94a3b8">${+r.d.slice(8)}</div></div>`;
  }).join('');
  // メニュー別テーブル
  const rows=a.perArr.map(p=>{
    const rate=Math.round(p.done/a.nDays*100);
    return `<tr><td>${p.task.icon} ${esc(p.task.title)}</td><td style="text-align:center">${p.done}回 (${rate}%)</td>
      <td style="text-align:center">😆${p.love} 🙂${p.ok} 😮‍💨${p.meh}</td></tr>`;
  }).join('');
  // 記録推移
  let recBlock='';
  a.recordProgress.forEach(rp=>{
    if(rp.pts.length>=2){
      const W=480,H=110,pad=26,maxV=Math.max(...rp.pts.map(p=>p.v),1);
      const x=i=>rp.pts.length===1?W/2:pad+i*(W-pad*2)/(rp.pts.length-1);
      const y=v=>H-18-(v/maxV)*(H-36);
      const line=rp.pts.map((p,i)=>`${i?'L':'M'}${x(i)},${y(p.v)}`).join(' ');
      const dots=rp.pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="3" fill="#7c3aed"/>`).join('');
      recBlock+=`<div class="rp-card"><div class="rp-t">🏅 ${esc(rp.task.title)} の記録（${rp.first}→${rp.last}, ベスト${rp.best}）</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px"><path d="${line}" fill="none" stroke="#7c3aed" stroke-width="2.5"/>${dots}</svg></div>`;
    }
  });
  const insHtml=ins.map(([t,ico,txt])=>{
    const col=t==='good'?'#059669':t==='warn'?'#d97706':'#7c3aed';
    return `<li><span style="color:${col};font-weight:900">${ico}</span> ${esc(txt)}</li>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <title>つみかさねレポート ${a.start}〜${a.end}</title>
  <style>
    @page{size:A4;margin:14mm}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans JP','Hiragino Sans',sans-serif}
    body{color:#1e293b;font-size:11px;line-height:1.6}
    .head{background:linear-gradient(120deg,#0ea5e9,#6366f1);color:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px}
    .head h1{font-size:20px;font-weight:900}
    .head .sub{font-size:11px;opacity:.9;margin-top:3px}
    .kpis{display:flex;gap:10px;margin-bottom:14px}
    .k{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;text-align:center}
    .k .l{font-size:9px;color:#64748b;font-weight:700}
    .k .v{font-size:22px;font-weight:900;color:#4338ca}
    .sec{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:12px}
    .sec h2{font-size:13px;font-weight:900;margin-bottom:8px;color:#334155}
    .daybars{display:flex;align-items:flex-end;gap:3px;height:84px}
    table{width:100%;border-collapse:collapse;font-size:10px}
    th{background:#312e81;color:#fff;padding:5px 8px;text-align:left}
    td{border-bottom:1px solid #eef;padding:5px 8px}
    ul{padding-left:4px;list-style:none}
    li{padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11px}
    .rp-card{margin-top:8px}.rp-t{font-size:10px;font-weight:700;color:#475569}
    .foot{text-align:center;color:#94a3b8;font-size:9px;margin-top:14px}
    .noprint{text-align:center;margin:16px 0}
    .noprint button{font-size:14px;font-weight:900;border:none;border-radius:10px;padding:12px 28px;background:#6366f1;color:#fff;cursor:pointer}
    @media print{.noprint{display:none}}
  </style></head><body>
    <div class="head"><h1>📋 つみかさねレポート</h1><div class="sub">${fmtJp(a.start)} 〜 ${fmtJp(a.end)}（${a.nDays}日間）</div></div>
    <div class="kpis">
      <div class="k"><div class="l">実施した日</div><div class="v">${a.activeDays}/${a.nDays}</div><div class="l">継続率 ${actPct}%</div></div>
      <div class="k"><div class="l">平均達成率</div><div class="v">${pct}%</div></div>
      <div class="k"><div class="l">累計クリア</div><div class="v">${a.totalDone}</div></div>
      <div class="k"><div class="l">前半→後半</div><div class="v" style="font-size:16px">${a.trend>=0?'+':''}${a.trend.toFixed(1)}</div><div class="l">1日あたり</div></div>
    </div>
    <div class="sec"><h2>📊 日ごとの達成メニュー数</h2><div class="daybars">${dayBars}</div></div>
    ${recBlock?`<div class="sec"><h2>🏅 記録の推移</h2>${recBlock}</div>`:''}
    <div class="sec"><h2>📋 メニュー別の実施と気持ち</h2>
      <table><tr><th>メニュー</th><th style="text-align:center">実施</th><th style="text-align:center">気持ち</th></tr>${rows}</table></div>
    <div class="sec"><h2>🔍 分析と気づき</h2><ul>${insHtml}</ul></div>
    <div class="foot">まいにちの つみかさね — 自動生成レポート</div>
    <div class="noprint"><button onclick="window.print()">🖨 印刷 / PDFで保存</button></div>
    <script>setTimeout(function(){window.print()},600)<\/script>
  </body></html>`;

  const w=window.open('','_blank');
  if(!w){alert('ポップアップがブロックされました。ブラウザの設定で許可してください');return}
  w.document.write(html);w.document.close();
}

function viewSettings(){
  const secEd=(key,label,cls)=>{
    const rows=tasks[key].map((t,i)=>{
      let badge='';
      if(t.from&&today<t.from)badge=`<span class="rsv-badge soon">📅 ${t.from}から</span>`;
      else if(t.to&&today>t.to)badge=`<span class="rsv-badge ended">⏹ ${t.to}で終了</span>`;
      else if(t.to)badge=`<span class="rsv-badge until">〜${t.to}まで</span>`;
      return `<div class="set-item ${(t.from&&today<t.from)?'rsv-dim':''}">
      <span class="ico">${t.icon}</span>
      <div class="info"><div class="ti">${esc(t.title)}${badge}</div><div class="su">${t.min}分${t.recordLabel?' ・🏅'+esc(t.recordLabel):''}</div></div>
      <button class="sbtn mv" onclick="act.move('${key}',${i},-1)">↑</button>
      <button class="sbtn mv" onclick="act.move('${key}',${i},1)">↓</button>
      <button class="sbtn ed" onclick="act.openEdit('${key}',${i})">編集</button>
      <button class="sbtn de" onclick="act.remove('${key}',${i})">削除</button>
    </div>`;}).join('');
    const add=tasks[key].length<5
      ?`<button class="add-btn ${cls}" onclick="act.openEdit('${key}',-1)">＋ メニューを追加（最大5つ）</button>`
      :`<button class="add-btn ${cls}" onclick="act.openEdit('${key}',-1)" style="opacity:.92">🔄 入れ替えで追加（既存と差し替え）</button><div class="limit-note">※ 表示は各部5つまで。入れ替え予約中だけ一時的に6つ持てます</div>`;
    return`<div class="card"><div class="card-title">${label}</div>${rows}${add}</div>`;
  };
  return secEd('morning','🌅 朝の部のメニュー','o')+secEd('evening','🌙 夜の部のメニュー','p')+`
    <div class="card"><div class="card-title">🏷 日記の タグ</div>
      <div class="sig-note" style="margin-bottom:8px">日記に つける タグを 管理できます。フィルターで しぼりこめます。</div>
      <div class="tagmng">${diaryTags.map((t,i)=>`<span class="tagmng-item">${esc(t)}<button onclick="act.removeTag(${i})">×</button></span>`).join('')||'<span style="color:#94a3b8;font-size:12px">タグが ありません</span>'}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="newtag-input" placeholder="例: すいえい" style="flex:1;border:2px solid #e2e8f0;border-radius:10px;padding:10px;font-family:inherit">
        <button class="cbtn t" onclick="act.addTag()">ついか</button>
      </div>
    </div>
    <div class="card"><div class="card-title">🌤 天気の ちいき</div>
      <div class="sig-note" style="margin-bottom:8px">いまの ちいき：<b>${esc(weatherLoc.name)}</b></div>
      <div style="display:flex;gap:8px">
        <input id="wx-input" placeholder="例: 横浜 / 渋谷区 / 札幌" style="flex:1;border:2px solid #e2e8f0;border-radius:10px;padding:10px;font-family:inherit">
        <button class="cbtn t" onclick="act.setWeatherLoc()">せってい</button>
      </div>
      <div class="sig-note" style="margin-top:8px;color:#94a3b8">市区町村や地名を入れて「せってい」を押すと、その地点の天気が「きょう」画面に出ます。</div>
    </div>
    <div class="card"><div class="card-title">☁️ クラウド同期（じどう）</div>
      <div class="sig-note" style="margin-bottom:10px;color:#059669;font-weight:700">✅ このアプリは同期せってい済みです。どの端末でも、開くだけで記録が同期されます（URL設定は不要）。</div>
      <div class="cloud-btns">
        <button class="cbtn t" onclick="act.cloudTest()">接続テスト</button>
        <button class="cbtn s" onclick="act.cloudPush()">今すぐ送信</button>
        <button class="cbtn l" onclick="act.cloudPull()">今すぐ読み込む</button>
      </div>
      <div class="toggle-row"><span>変更したら自動でクラウドに保存する</span>
        <input type="checkbox" ${cloud.auto?'checked':''} onchange="act.cloudAuto(this.checked)" style="width:20px;height:20px"></div>
      <div class="sig-note" style="margin-top:10px">記録は日付ごとに賢く合体するので、複数端末で同時に使っても上書き事故は起きません。メニューの「どうがURL」も同期されます（図解がぞうは各端末内のみの保存）。</div>
    </div>
    <div class="card"><div class="card-title">💾 データのバックアップ</div>
      <div class="io-row">
        <button class="io-btn ex" onclick="act.exportData()">⬇ 書き出す</button>
        <button class="io-btn im" onclick="act.importData()">⬆ 読み込む</button>
      </div>
      <div class="sig-note" style="margin-top:10px">データはこのChrome（この端末）の中に保存されます。別の端末に引っこしたいとき・念のための保存に「書き出す」を使ってください。Chromeの閲覧データを削除すると消えるので、月1回の書き出しがおすすめです。</div>
    </div>
    <div class="card"><div class="card-title">💡 運用メモ（おうちのひと向け）</div>
      <ul class="note-list">
        <li>枠は厳しく、評価は温かく。メニューと時間は固定、声かけはプロセスへ。</li>
        <li>ゼロの日を作らない。疲れた日は1つだけでもOK（連続日数は「1つでもやった日」でカウント）。</li>
        <li>3ヶ月ごとに「ねっちゅうシグナル」を見て入れ替えを検討。😆が多い種目に時間を投資。</li>
        <li>「🏅記録」欄は任意のメニューに付けられます（例: なわとび回数、計算タイム）。</li>
        <li>各メニューの「⏱タイマー」は設定した分数のカウントダウン。終わると音が鳴り、そのままチェックできます。</li>
        <li>「編集」から図解がぞう・どうがURLを登録すると、メニューに「❓やりかた」ボタンが出ます。</li>
      </ul>
    </div>`;
}

function renderOverlay(){
  const o=document.getElementById('overlay');
  if(!editing){o.innerHTML='';return}
  const isNew=editing.index===-1;
  const t=isNew?{icon:'⭐',title:'',desc:'',min:5,recordLabel:'',recordUnit:'かい',video:'',from:'',to:''}:tasks[editing.section][editing.index];
  const curImg=(!isNew&&pendingImg===undefined&&imgs[t.id])?imgs[t.id]:(typeof pendingImg==='string'?pendingImg:null);
  o.innerHTML=`<div class="modal-bg" onclick="act.closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${isNew?'メニューを追加':'メニューを編集'}</h3>
      <div class="f-inline">
        <div class="f-row" style="flex:0 0 90px"><label>アイコン</label><input id="f-icon" value="${esc(t.icon)}" style="text-align:center;font-size:20px"></div>
        <div class="f-row" style="flex:0 0 90px"><label>分</label><input id="f-min" type="number" min="1" value="${t.min}" style="text-align:center"></div>
      </div>
      <div class="f-row"><label>タイトル</label><input id="f-title" value="${esc(t.title)}" placeholder="例: なわとび"></div>
      <div class="f-row"><label>やり方（説明）</label><input id="f-desc" value="${esc(t.desc)}" placeholder="例: 前とび30回 → 後ろとび10回"></div>
      <div class="f-row"><label>🏅 記録ラベル（任意・数字記録をつけたい場合）</label><input id="f-rec" value="${esc(t.recordLabel||'')}" placeholder="例: 連続最高きろく"></div>
      <div class="f-row"><label>📏 記録の単位</label>
        <select id="f-recunit" style="width:100%;box-sizing:border-box;border:2px solid #e2e8f0;border-radius:10px;padding:9px;font-family:inherit;font-weight:700;font-size:14px;background:#fff">
          ${REC_UNITS.map(u=>`<option value="${u}" ${(t.recordUnit||'かい')===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="f-row"><label>▶ どうがURL（任意・YouTube等。「やりかた」で見られます）</label><input id="f-video" value="${esc(t.video||'')}" placeholder="https://www.youtube.com/watch?v=…"></div>
      ${isNew?`<div class="f-row swap-box"><label>🔄 入れ替え（任意）— このメニューと 入れ替える場合</label>
        <select id="f-swap" style="width:100%;box-sizing:border-box;border:2px solid #e2e8f0;border-radius:10px;padding:9px;font-family:inherit;font-weight:700;font-size:14px;background:#fff" onchange="act.onSwapChange()">
          <option value="">入れ替えなし（ふつうに追加）</option>
          ${tasks[editing.section].map((x,xi)=>`<option value="${xi}">${esc(x.icon)} ${esc(x.title)} と入れ替え</option>`).join('')}
        </select>
        <div id="f-swap-date-row" style="display:none;margin-top:8px">
          <div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px">入れ替え日（この日から 新メニューに きりかわります）</div>
          <input id="f-swapdate" type="date" value="${today}" style="width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none">
          <div style="font-size:10px;color:#cbd5e1;margin-top:4px">えらんだ メニューは 前日で終了し、この新メニューが その日から始まります。下の「よやく」は じどうで 設定されます。</div>
        </div>
      </div>`:''}
      <div class="f-row" id="f-yoyaku-row"><label>📅 よやく（任意）— いつから／いつまで このメニューを出すか</label>
        <div class="f-inline" style="gap:8px">
          <div style="flex:1"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px">かいし日（あさってからなど）</div><input id="f-from" type="date" value="${esc(t.from||'')}" style="width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none"></div>
          <div style="flex:1"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px">しゅうりょう日（そつぎょう日・なくてもOK）</div><input id="f-to" type="date" value="${esc(t.to||'')}" style="width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none"></div>
        </div>
        <div style="font-size:10px;color:#cbd5e1;margin-top:4px">からっぽなら「ずっと表示」。かいし日を 未来にすると、その日まで「きょう」に出ません。</div>
      </div>
      <div class="f-row"><label>🖼 図解がぞう（任意・この端末内に保存）</label>
        <div id="f-img-area">${curImg?`<img src="${curImg}" class="hw-thumb"><button class="sbtn de" type="button" onclick="act.imgDelete()">画像を削除</button>`:'<span style="font-size:11px;color:#94a3b8">（画像なし）</span>'}</div>
        <input class="f-file" type="file" accept="image/*" onchange="act.imgPick(this)">
      </div>
      <div class="m-btns">
        <button class="m-btn m-cancel" onclick="act.closeModal()">キャンセル</button>
        <button class="m-btn m-save" onclick="act.saveEdit()">保存する</button>
      </div>
    </div></div>`;
}

render();
if(cloud.url){autoPull();fetchCheers();fetchPlans();fetchMemos();fetchLog();}
fetchWeather();
</script>
</body>
</html>
